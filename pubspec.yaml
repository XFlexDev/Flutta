name: flutta
description: A beautiful Flutter crypto wallet with smooth animations and send-all feature.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web3dart: ^2.3.0
  http: ^1.2.0
  bip39: ^1.0.4
  flutter_secure_storage: ^9.2.2
  confetti: ^0.7.0
  qr_flutter: ^4.1.0
  fluttertoast: ^8.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
